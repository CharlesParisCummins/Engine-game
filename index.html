<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Engine Components Training Game</title>
<style>
body { font-family: Arial, sans-serif; background:#f4f6f8; padding:10px; }
h1 { text-align:center; margin-bottom:5px; }
.topbar { display:flex; justify-content:space-between; align-items:center; max-width:1400px; margin:0 auto 10px; }
.main { display:grid; grid-template-columns: 260px 1fr; gap:15px; max-width:1400px; margin:auto; }
.labels { background:white; padding:10px; border-radius:10px; box-shadow:0 3px 8px rgba(0,0,0,.1); max-height:75vh; overflow-y:auto; }
.label { padding:6px; margin:5px 0; background:#e0e7ff; border-radius:6px; cursor:grab; text-align:center; font-size:14px; }
.images { background:white; padding:10px; border-radius:10px; box-shadow:0 3px 8px rgba(0,0,0,.1); }
.image-grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; }
.image-box { border:2px dashed #bbb; border-radius:8px; padding:5px; text-align:center; min-height:120px; }
.image-box img { max-width:100%; height:70px; pointer-events:none; }
.correct { border-color:#22c55e; background:#dcfce7; }
.wrong { border-color:#ef4444; background:#fee2e2; }
.leaderboard { max-width:1400px; margin:15px auto; background:white; padding:10px; border-radius:10px; box-shadow:0 3px 8px rgba(0,0,0,.1); }
#startBtn { display:block; margin:10px auto; padding:8px 15px; font-size:16px; }
</style>
</head>
<body>
<h1>Engine Components – Drag & Drop</h1>
<button id="startBtn">Start Game</button>
<div class="topbar">
  <div>
    <strong>Score:</strong> <span id="score">0</span> / <span id="total"></span> |
    <strong>Wrong:</strong> <span id="wrongCount">0</span> |
    <strong>Time:</strong> <span id="timer">0</span>s
  </div>
  <div>
    <button onclick="resetWrong()">Reset wrong</button>
    <button onclick="resetAll()">Reset game</button>
    <button onclick="exportCSV()">Export leaderboard</button>
  </div>
</div>
<div class="main">
  <div class="labels" id="labelContainer"></div>
  <div class="images">
    <div class="image-grid" id="imageGrid"></div>
  </div>
</div>
<div class="leaderboard">
  <h3>Leaderboard (best results)</h3>
  <ol id="leaderboard"></ol>
</div>
<audio id="correctSound" src="sounds/correct.mp3" preload="auto"></audio>
<audio id="wrongSound" src="sounds/wrong.mp3" preload="auto"></audio>
<script>
const components = ['valve','camshaft','injector','crankshaft','bearing','piston','conrod','cylinder_block','rocker','gasket','oil_pan','fuel_filter','turbocharger','alternator','starter','harness','belt','oil_pump','liner','water_pump','water_filter'];
const TOTAL = components.length;
let score = 0;
let wrong = 0;
let time = 0;
let timerInterval;
const scoreEl=document.getElementById('score');
const wrongEl=document.getElementById('wrongCount');
const timerEl=document.getElementById('timer');
const labelContainer=document.getElementById('labelContainer');
const imageGrid=document.getElementById('imageGrid');
let labelsHTML='';
const correctSound=document.getElementById('correctSound');
const wrongSound=document.getElementById('wrongSound');

function startTimer(){
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{time++; timerEl.textContent=time;},1000);
}

function shuffle(array){for(let i=array.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[array[i],array[j]]=[array[j],array[i]];}}

function buildLabels(){
  labelContainer.innerHTML='';
  components.forEach(c=>{
    const label=document.createElement('div');
    label.className='label';
    label.draggable=true;
    label.dataset.name=c;
    label.textContent=c.replace('_',' ');
    labelContainer.appendChild(label);
  });
  labelsHTML=labelContainer.innerHTML;
  enableDrag();
}

function buildImages(){
  imageGrid.innerHTML='';
  const shuffled=[...components];
  shuffle(shuffled);
  shuffled.forEach(c=>{
    const box=document.createElement('div');
    box.className='image-box';
    box.dataset.accept=c;
    box.innerHTML=`<img src='images/${c}.jpg'>`;
    box.addEventListener('dragover',e=>e.preventDefault());
    box.addEventListener('drop',e=>handleDrop(e,box));
    imageGrid.appendChild(box);
  });
}

function enableDrag(){
  document.querySelectorAll('.label').forEach(label=>{
    label.addEventListener('dragstart',e=>{ e.dataTransfer.setData('text/plain',label.dataset.name); });
  });
}

function playCorrect(){ correctSound.pause(); correctSound.currentTime=0; correctSound.play(); }
function playWrong(){ wrongSound.pause(); wrongSound.currentTime=0; wrongSound.play(); }

function handleDrop(e,box){
  e.preventDefault();
  if(box.dataset.filled) return;
  const dragged=e.dataTransfer.getData('text/plain');
  if(dragged===box.dataset.accept){
    box.classList.add('correct');
    box.dataset.filled='true';
    document.querySelector(`.label[data-name="${dragged}"]`)?.remove();
    score++; scoreEl.textContent=score;
    playCorrect();
    if(score===TOTAL) finishGame();
  } else {
    box.classList.add('wrong');
    wrong++; wrongEl.textContent=wrong;
    playWrong();
  }
}

function finishGame(){
  clearInterval(timerInterval);
  const name=prompt('Finished! Enter your name:');
  if(!name) return;
  const leaderboard=JSON.parse(localStorage.getItem('leaderboard')||'[]');
  leaderboard.push({name,score,time,wrong,date:new Date().toLocaleString()});
  leaderboard.sort((a,b)=>a.time-b.time || a.wrong-b.wrong);
  localStorage.setItem('leaderboard',JSON.stringify(leaderboard));
  renderLeaderboard();
}

function renderLeaderboard(){
  const data=JSON.parse(localStorage.getItem('leaderboard')||'[]');
  const ol=document.getElementById('leaderboard');
  ol.innerHTML='';
  data.slice(0,10).forEach(e=>{
    const li=document.createElement('li');
    li.textContent=`${e.name} – ${e.time}s – wrong: ${e.wrong}`;
    ol.appendChild(li);
  });
}

function exportCSV(){
  const data=JSON.parse(localStorage.getItem('leaderboard')||'[]');
  if(!data.length) return alert('No data');
  let csv='Name,Score,Time,Wrong,Date\n';
  data.forEach(e=>csv+=`${e.name},${e.score},${e.time},${e.wrong},${e.date}\n`);
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='leaderboard.csv';
  a.click();
}

function resetWrong(){document.querySelectorAll('.wrong').forEach(b=>b.classList.remove('wrong'));}
function resetAll(){
  clearInterval(timerInterval); score=0; wrong=0; time=0;
  scoreEl.textContent=0; wrongEl.textContent=0; timerEl.textContent=0;
  labelContainer.innerHTML=labelsHTML;
  buildImages(); startTimer();
}

document.getElementById('startBtn').addEventListener('click',()=>{
  buildLabels(); buildImages(); startTimer();
  document.getElementById('startBtn').style.display='none';
  renderLeaderboard();
});
</script>
</body>
</html>
